name: Auto Build Engine

on: 
  release:
    types: [published]
  schedule:
    - cron: "0 16 * * *"
  push:
    branches: 
      - master
  workflow_dispatch: 

# Grant write permissions so the workflow can force-push to the repository
permissions:
  contents: write

jobs:
  build:
    name: Build Magisk
    runs-on: ubuntu-24.04
    steps:
      - name: Check out Magisk
        uses: actions/checkout@v4
        with:
          repository: "topjohnwu/Magisk"
          submodules: "recursive"
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up NDK
        run: python build.py -v ndk

      - name: Patch
        run: |
          wget --no-check-certificate https://raw.githubusercontent.com/ActiveIce/Magisk_zygote64_32/master/zygote64_32.patch -O zygote64_32.patch
          git apply zygote64_32.patch --reject || echo "Patch applied with some rejections or already applied"
  
      - name: Generate Random Keystore & Config
        run: |
          # Generate a random 12-character password
          RAND_PASS=$(openssl rand -base64 9 | tr -d '/+=')
          
          # Generate a random keystore on the fly using Java keytool
          keytool -genkeypair \
            -v \
            -keystore keystore.jks \
            -alias magisk_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$RAND_PASS" \
            -keypass "$RAND_PASS" \
            -dname "CN=Android,OU=Development,O=Magisk,L=Unknown,S=Unknown,C=US"
          
          # Write configuration properties matching the generated keystore
          echo "keyStore=keystore.jks" > config.prop
          echo "keyStorePass=$RAND_PASS" >> config.prop
          echo "keyAlias=magisk_key" >> config.prop
          echo "keyPass=$RAND_PASS" >> config.prop

      - name: Build release
        run: |
          python build.py -vr all

      - name: Update canary
        run: |
          rev=$(git rev-parse --short=8 HEAD)
          link=https://raw.githubusercontent.com/ActiveIce/Magisk_zygote64_32/master/
          wget --no-check-certificate https://raw.githubusercontent.com/topjohnwu/magisk-files/master/canary.json -O out/canary.json
          sed -i "s#\"version\": \".*\"#\"version\": \"${rev}\"#" out/canary.json
          sed -i "s#\"link\": \".*app-release.apk\"#\"link\": \"${link}app-release.apk\"#g" out/canary.json
          sed -i "s#\"link\": \".*stub-release.apk\"#\"link\": \"${link}stub-release.apk\"#g" out/canary.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: magisk
          path: |
            out/app-release.apk
            out/stub-release.apk
            out/canary.json

  push:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
    
      - name: Clean
        run: |
          rm -f *.apk *.json
    
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: magisk
          path: ./
    
      - name: Commit & Force Push
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git checkout --orphan new_branch
          git add -A
          git commit -am "update new file"
          git branch -D master || true
          git branch -m master
          git push origin master --force
